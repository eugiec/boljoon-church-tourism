<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boljoon Church | Home</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --warm-brown: #5a4a3a;
    --golden-accent: #c9a66e;
    --cream-bg: #f8f5f0;
    --soft-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--cream-bg);
    color: #2d2d2d;
    line-height: 1.7;
    overflow-x: hidden;
}

/* HERO SECTION */
.hero {
    width: 100%;
    min-height: 100vh;
    background: url('title-bg.jpg') center center / cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    position: relative;
}

/* Dark overlay */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65));
}

.hero-content {
    position: relative;
    z-index: 2;
    padding: 1rem;
    max-width: 900px;
}

/* TITLE */
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(40px);
    transition: all 1s ease;
}

.hero h1.show {
    opacity: 1;
    transform: translateY(0);
}

.hero p {
    font-size: 1.3rem;
    margin: 1rem 0 2rem;
    opacity: 0;
    transform: translateY(40px);
    transition: all 1s ease 0.3s;
}

.hero p.show {
    opacity: 0.9;
    transform: translateY(0);
}

/* NAVIGATION BUTTONS */
.nav-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1rem;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 0.8rem 1.8rem;
    border: 2px solid white;
    border-radius: 30px;
    font-weight: 500;
    font-size: 1rem;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.6s ease;
}

.nav-links a:nth-child(1) { transition-delay: 0.4s; }
.nav-links a:nth-child(2) { transition-delay: 0.6s; }
.nav-links a:nth-child(3) { transition-delay: 0.8s; }

.nav-links a.show {
    opacity: 1;
    transform: translateY(0);
}

.nav-links a:hover {
    background: var(--golden-accent);
    border-color: var(--golden-accent);
    color: #fff;
    transform: translateY(-4px);
    box-shadow: var(--soft-shadow);
}

/* DESKTOP PARALLAX */
@media (min-width: 769px) {
    .hero {
        background-attachment: fixed;
    }
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 2rem;
    }

    .hero p {
        font-size: 1.1rem;
    }

    .nav-links a {
        padding: 0.6rem 1.2rem;
        font-size: 0.95rem;
    }
}
</style>
</head>
<body>

<div class="hero">
    <div class="hero-content">
        <h1>THE ARCHDIOCESAN SHRINE <br> OF NUESTRA SEÑORA <br>
             PATROCINIO DE MARIA SANTISMA
        </h1>
        <p>Boljoon, Cebu • A Heritage of Faith</p>

        <div class="nav-links">
            <a href="title.html">Home</a>
            <a href="inside.html">Explore</a>
            <a href="back.html">Contact Us</a>
        </div>
    </div>
</div>

<script>
window.addEventListener("load", () => {
    document.querySelector('.hero h1').classList.add('show');
    document.querySelector('.hero p').classList.add('show');
    document.querySelectorAll('.nav-links a').forEach(link => link.classList.add('show'));
});
</script>

</body>
</html>
